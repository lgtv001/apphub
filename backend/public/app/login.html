<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AppHub — Iniciar sesión</title>
  <link rel="stylesheet" href="/assets/css/app.css"/>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      width: 360px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo h1 {
      font-size: 24px;
      letter-spacing: -0.5px;
    }
    .login-logo .subtitle {
      margin-top: 4px;
    }
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0;
      color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .btn-oauth {
      width: 100%; margin-bottom: 10px; justify-content: center;
      background: var(--bg-row);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
    }
    .btn-oauth:hover { border-color: var(--blue); color: var(--text); opacity: 1; background: rgba(79,126,255,0.06); }
    .oauth-icon { width: 18px; height: 18px; display: inline-block; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">

      <div class="login-logo">
        <h1>AppHub</h1>
        <p class="subtitle">Plataforma de gestión de proyectos</p>
      </div>

      <div class="card">
        <h2 style="margin-bottom:20px">Iniciar sesión</h2>

        <div id="alert-error" class="alert alert-error hidden"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email"
                   placeholder="usuario@empresa.cl" autocomplete="email"/>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password"
                   placeholder="••••••••" autocomplete="current-password"/>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px"
                  id="btn-submit">
            Ingresar
          </button>
        </form>

        <div class="divider">o solicitar acceso con</div>

        <button type="button" class="btn btn-oauth" onclick="window.location.href='/auth/github/redirect'">
          <svg class="oauth-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.54-1.37-1.33-1.74-1.33-1.74-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.28-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.93.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          Solicitar acceso con GitHub
        </button>

        <button type="button" class="btn btn-oauth" onclick="window.location.href='/auth/google/redirect'">
          <svg class="oauth-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Solicitar acceso con Google
        </button>

      </div>

    </div>
  </div>

  <script type="module">
    import { saveSession, getToken } from '/assets/js/api.js';

    if (getToken()) {
      window.location.href = '/app/selector-proyecto.html';
    }

    // Show feedback from OAuth redirects
    const params = new URLSearchParams(window.location.search);
    if (params.get('oauth_error')) {
      const el = document.getElementById('alert-error');
      el.textContent = 'Error al conectar con el proveedor OAuth. Intenta de nuevo.';
      el.classList.remove('hidden');
    } else if (params.get('oauth_exists')) {
      const el = document.getElementById('alert-error');
      el.textContent = 'Ya tienes una cuenta registrada. Inicia sesión con tu correo y contraseña.';
      el.classList.remove('hidden');
    }

    const form      = document.getElementById('login-form');
    const alertEl   = document.getElementById('alert-error');
    const btnSubmit = document.getElementById('btn-submit');

    function showError(msg) {
      alertEl.textContent = msg;
      alertEl.classList.remove('hidden');
    }

    function clearError() {
      alertEl.classList.add('hidden');
      alertEl.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email    = form.email.value.trim();
      const password = form.password.value;

      if (!email || !password) {
        showError('Ingresa tu correo y contraseña.');
        return;
      }

      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Ingresando...';

      try {
        const res = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.message ?? 'Error al iniciar sesión.');
          return;
        }

        saveSession(data.token, data.usuario);
        window.location.href = '/app/selector-proyecto.html';

      } catch {
        showError('No se pudo conectar al servidor. Verifica tu conexión.');
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
